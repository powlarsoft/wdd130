<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting Company</title>
  <meta name="description" content="Reach out to White Water Rafting Company. Find our address, phone number, email, map, and send us a message using our contact form.">
  <meta name="author" content="Powell Nana">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <!-- Header -->
  <header>
    <img src="images/z-wwr-oars.png" width="150" alt="Whitewater Rafting Logo">
    <nav>
      <ul class="navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Contact Block: Company Info + Map + Form -->
    <section class="contact-block">
      <!-- Company Info -->
      <div class="company-info">
        <h1>Whitewater Rafting Company</h1>
        <p>123 Main River Street<br>Kolob, California</p>
        <p>Phone: +1 555 555 5555</p>
        <p>Email: info@whitewater.com</p>
      </div>

      <!-- Two-column layout -->
      <div class="contact-layout">
        <!-- Map -->
        <div class="map">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d6512733.131981885!2d-124.5988976998478!3d37.15161820246821!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1s123%20Main%20River%20Street%20Kolob%2C%20California!5e0!3m2!1sen!2sng!4v1781398321029!5m2!1sen!2sng"
            style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>

        <!-- Form -->
        <div class="contact-form">
          <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <fieldset>
              <legend>Message Purpose:</legend>
              <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
              <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
              <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
            </fieldset>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <label>
              <input type="checkbox" name="newsletter"> Please subscribe me to the monthly newsletter
            </label>

            <button type="submit" class="btn-submit">Get in Touch!</button>
          </form>
        </div>
      </div>
    </section>

    <!-- Employee Profiles -->
    <section class="contact-team">
      <h2>We Are Here to Serve You</h2>
      <div class="profiles">
        <figure>
          <img src="images/employee1.jpg" alt="Adventure Guide Sarah Johnson">
          <figcaption>Sarah Johnson — Adventure Guide</figcaption>
        </figure>
        <figure>
          <img src="images/employee2.jpg" alt="Customer Support Michael Lee">
          <figcaption>Michael Lee — Customer Support</figcaption>
        </figure>
        <figure>
          <img src="images/employee3.jpg" alt="Safety Instructor Emily Davis">
          <figcaption>Emily Davis — Safety Instructor</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Whitewater Rafting Co. | Powell Nana</p>
    <nav class="socialmedia">
      <a href="https://facebook.com">
        <img src="images/social_15466130.png" alt="Facebook Icon">
      </a>
      <a href="https://linkedin.com">
        <img src="images/linkedin_2584663.png" alt="LinkedIn Icon">
      </a>
      <a href="https://instagram.com">
        <img src="images/instagram_2626270.png" alt="Instagram Icon">
      </a>
    </nav>
  </footer>
</body>
</html>
